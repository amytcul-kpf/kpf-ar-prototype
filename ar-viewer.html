<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KPF AR — Camera View</title>

  <!-- MindAR 1.2.5 ships both dist files as ES modules, so they must be
       loaded via an import map + <script type="module">, not classic
       <script src>. This is MindAR's official usage pattern. -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Helvetica Neue', sans-serif;
    }

    /* MindAR renders into this container */
    #ar-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* HUD Overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }

    #hud .logo {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 3px;
    }

    #hud .status {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #hud .status.found {
      background: rgba(0, 200, 100, 0.2);
      border-color: rgba(0, 200, 100, 0.5);
      color: #00c864;
    }

    .hud-actions {
      display: flex;
      gap: 8px;
    }

    #back-btn, #unmute-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      font-family: inherit;
    }

    #back-btn:hover, #unmute-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Scanning guide frame */
    #scan-guide {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 240px;
      z-index: 998;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #scan-guide.hidden { opacity: 0; }

    #scan-guide::before,
    #scan-guide::after,
    #scan-guide .corner-br,
    #scan-guide .corner-bl {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: rgba(255,255,255,0.8);
      border-style: solid;
    }

    #scan-guide::before {
      top: 0; left: 0;
      border-width: 3px 0 0 3px;
    }

    #scan-guide::after {
      top: 0; right: 0;
      border-width: 3px 3px 0 0;
    }

    #scan-guide .corner-br {
      bottom: 0; right: 0;
      border-width: 0 3px 3px 0;
    }

    #scan-guide .corner-bl {
      bottom: 0; left: 0;
      border-width: 0 0 3px 3px;
    }

    /* Scan instruction text */
    #scan-text {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      text-align: center;
      z-index: 999;
      transition: opacity 0.5s;
      letter-spacing: 1px;
    }

    #scan-text.hidden { opacity: 0; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading-overlay .logo {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 6px;
    }

    #loading-overlay p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      animation: loadBar 3s ease-in-out forwards;
    }

    @keyframes loadBar {
      0% { width: 0%; }
      60% { width: 80%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-overlay">
    <div class="logo">KPF</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <p id="loading-text">Initialising AR engine...</p>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="logo">KPF</div>
    <div class="status" id="statusLabel">🔍 Scanning...</div>
    <div class="hud-actions">
      <button id="unmute-btn">🔊 Unmute</button>
      <button id="back-btn" onclick="goBack()">← Back</button>
    </div>
  </div>

  <!-- Scan Guide Frame -->
  <div id="scan-guide">
    <div class="corner-br"></div>
    <div class="corner-bl"></div>
  </div>

  <p id="scan-text">Point camera at your printed image</p>

  <!-- AR Container -->
  <div id="ar-container"></div>

  <script type="module" src="ar.js"></script>
</body>
</html>
